  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="200" cy="150" r="100" fill="#C65D3E" opacity="0.15" filter="url(#blur)"/>
  <circle cx="900" cy="600" r="150" fill="#9CAF88" opacity="0.1" filter="url(#blur)"/>
  <text x="600" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="48" fill="#5C3D2E" opacity="0.3">Lola Maria</text>
  <text x="600" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#5C3D2E" opacity="0.2">Pastelería &amp; Comida Argentina</text>

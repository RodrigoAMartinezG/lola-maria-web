    <path d="M380 420 L400 380 L420 420" fill="none" stroke="#5C3D2E" stroke-width="2"/>
  </g>
  <text x="400" y="520" font-family="Georgia, serif" font-size="24" fill="#5C3D2E" opacity="0.4" text-anchor="middle">Nuestra Cocina</text>
  <text x="400" y="550" font-family="Georgia, serif" font-size="16" fill="#5C3D2E" opacity="0.3" text-anchor="middle">Lola Maria</text>
